# Copy this file to config.yaml and fill in local secrets.
# Do not commit real SID, AI keys, or WeCom credentials.

database_path: data/alerts.db
lock_file: data/run.lock
log_file: logs/alert_ai_assistant.log
timezone: Asia/Shanghai
log_level: INFO
# 规则兜底摘要每个段落最多展开多少条明细，超过后提示未展开数量。
max_summary_items_per_section: 80

source:
  # Use mock_text for local development, monitor_api for the company network.
  kind: mock_text
  mock_text_path: "C:/path/to/企业微信告警消息复制.txt"

monitor_api:
  enabled: false
  base_url: "https://10.50.132.120"
  search_path: "/api/monitor/alarm/search"
  sid: ""
  # 你提供的网管接口示例使用 token=SID；如实际接口字段名不同可改成 secret 等。
  sid_param_name: "token"
  owner_instance_name: "你的负责人姓名"
  timeout_seconds: 30
  # 仅用于已结束告警的 create_time 回溯查询；未处理/处理中只查摘要窗口内告警。
  active_lookback_days: 5
  # 告警很多时自动分页，避免单次最多1000条导致漏拉。
  page_limit: 1000
  max_pages: 20
  # 自签名证书自动跳过验证。
  field_mapping:
    device_ip: "ip"
    hostname: "instance_name"
    alarm_time: "create_time"
    title: "alarm_title"
    content: "alarm_content"
    severity: "alarm_level_id"
    external_id: "id"
  # Fill bucket-specific status filters after confirming platform status values.
  bucket_search_units:
    unhandled:
      - attr: is_ignore
        search: [0]
        operator: "="
      - attr: status
        search: [0]
        operator: "="
      - attr: instance_name
        search: ["你的负责人姓名"]
        operator: "="
    processing:
      - attr: status
        search: [1]
        operator: "="
      - attr: is_ignore
        search: [0]
        operator: "="
      - attr: instance_name
        search: ["你的负责人姓名"]
        operator: "="
    ended:
      - attr: is_recover
        search: [1]
        operator: "="
      - attr: status
        search: [2]
        operator: "="
      - attr: instance_name
        search: ["你的负责人姓名"]
        operator: "="

llm:
  enabled: false
  base_url: "https://api.deepseek.com"
  api_key: ""
  model: "deepseek-chat"
  timeout_seconds: 60
  max_focus_alerts: 10
  # 发给 LLM 的每类告警明细上限，避免告警爆发时 prompt 过长。
  max_prompt_alerts_per_bucket: 80

wecom:
  enabled: false
  webhook_url: ""
  token: ""
  target_user: ""
  # 企业微信对单条消息有长度限制。字节上限比字符上限更关键，中文会占多个字节。
  max_message_chars: 3500
  max_message_bytes: 3000
  max_retries: 2
  retry_delay_seconds: 1.0
  msg_type: markdown
  dry_run: true

retention:
  raw_alert_days: 5
  summary_days: 15
  log_days: 15

low_priority_keywords:
  - "服务器接入交换机端口连接状态告警"
  - "端口连接状态告警"
  - "使用率告警"
  - "入流量使用率"
  - "出流量使用率"

# mask_names: []  # 脱敏功能已移除，此配置不再生效
