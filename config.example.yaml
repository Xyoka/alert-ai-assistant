# Copy this file to config.yaml and fill in local secrets.
# Do not commit real SID, AI keys, or WeCom credentials.

database_path: data/alerts.db
lock_file: data/run.lock
log_file: logs/alert_ai_assistant.log
timezone: Asia/Shanghai
log_level: INFO
# summary_only: 只推送摘要，保持当前稳定版本行为。
# agent: 摘要优先由企业微信智能机器人发送，并支持对话问答；webhook 仅作摘要冷备。
app_mode: summary_only

source:
  # Use mock_text for local development, monitor_api for the company network.
  kind: mock_text
  mock_text_path: "C:/path/to/企业微信告警消息复制.txt"

monitor_api:
  enabled: false
  base_url: "https://10.50.132.120"
  search_path: "/api/monitor/alarm/search"
  sid: ""
  owner_instance_name: "你的负责人姓名"
  timeout_seconds: 30
  active_lookback_days: 5
  # API 查询参数用 secret= 而不是 token=，自签名证书自动跳过验证。
  field_mapping:
    device_ip: "ip"
    hostname: "instance_name"
    alarm_time: "create_time"
    title: "alarm_title"
    content: "alarm_content"
    severity: "alarm_level_id"
    external_id: "id"
  # Fill bucket-specific status filters after confirming platform status values.
  bucket_search_units:
    unhandled:
      - attr: is_ignore
        search: [0]
        operator: "="
      - attr: status
        search: [0]
        operator: "="
      - attr: instance_name
        search: ["你的负责人姓名"]
        operator: "="
    processing:
      - attr: status
        search: [1]
        operator: "="
      - attr: is_ignore
        search: [0]
        operator: "="
      - attr: instance_name
        search: ["你的负责人姓名"]
        operator: "="
    ended:
      - attr: is_recover
        search: [1]
        operator: "="
      - attr: status
        search: [2]
        operator: "="
      - attr: instance_name
        search: ["你的负责人姓名"]
        operator: "="

llm:
  enabled: false
  base_url: "https://api.deepseek.com"
  api_key: ""
  model: "deepseek-chat"
  timeout_seconds: 60
  max_focus_alerts: 10

wecom:
  enabled: false
  webhook_url: ""
  token: ""
  target_user: ""
  max_message_chars: 3500
  msg_type: markdown
  dry_run: true

wecom_intelligent_bot:
  enabled: false
  bot_id: ""
  secret: ""
  # 智能机器人主动发送摘要的目标。单聊填 userid，群聊填对应 chatid。
  summary_target_id: ""
  max_message_chars: 3500
  dry_run: true

agent:
  # 问答默认只查最近 7 天本地告警数据。
  history_days: 7
  max_candidates: 5
  outbox_poll_seconds: 5
  summary_send_confirm_seconds: 15
  # 智能机器人异常时，允许旧 webhook 兜底推送摘要。
  fallback_webhook_enabled: true
  recovery_notice_enabled: true
  append_reference_section: true
  summary_reference_limit: 8

retention:
  raw_alert_days: 5
  summary_days: 15
  log_days: 15

# 发送给 LLM、企业微信和智能机器人回复前会做兜底脱敏。
# monitor_api.owner_instance_name 会自动加入脱敏名单；这里可额外填写其他姓名。
mask_names: []

low_priority_keywords:
  - "服务器接入交换机端口连接状态告警"
  - "端口连接状态告警"
  - "使用率告警"
  - "入流量使用率"
  - "出流量使用率"
